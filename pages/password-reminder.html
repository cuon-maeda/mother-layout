<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MotherMap パスワードをお忘れの方</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Noto+Sans+JP:wght@400;500;600;700;800&family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@20..48,400,0,0&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../assets/css/styles.css" />
</head>
<body>
  <div class="auth-layout">
    <div class="shell">
      <h1 class="logo">
        <img src="../assets/images/mothermap_logo.png" alt="MotherMap" />
      </h1>

      <div class="card">
        <div class="body">
          <h2 class="title">パスワードをお忘れの方</h2>

          <form class="ui-form" action="#" method="get" aria-label="パスワード再設定">
            <div class="field">
              <label class="ui-label visually-hidden" for="client-code">利用会社コード</label>
              <input id="client-code" class="ui-control" type="text" name="client_code" placeholder="利用会社コード" autocomplete="organization" />
            </div>

            <div class="field">
              <label class="ui-label visually-hidden" for="email">メールアドレス</label>
              <input id="email" class="ui-control" type="email" name="email" placeholder="メールアドレス" autocomplete="email" />
            </div>

            <button type="submit" class="ui-btn--primary">送信</button>
          </form>
        </div>
      </div>

      <nav class="reminder" aria-label="ログインサポート">
        <a href="login-id-reminder.html">ログインIDをお忘れの方</a>
      </nav>
    </div>
  </div>
</body>
</html>
