<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MotherMap ログイン</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Noto+Sans+JP:wght@400;500;600;700;800&family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@20..48,400,0,0&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../assets/css/styles.css" />
</head>
<body>
  <div class="auth-layout">
    <div class="shell">
      <h1 class="logo">
        <img src="../assets/images/mothermap_logo.png" alt="MotherMap" />
      </h1>

      <div class="card">
        <div class="body">
          <form class="ui-form" action="#" method="get" aria-label="ログイン">
            <div class="field">
              <label class="ui-label visually-hidden" for="login-id">ログインID</label>
              <input id="login-id" class="ui-control" type="text" name="login_id" placeholder="ログインID" autocomplete="username" />
            </div>

            <div class="field">
              <label class="ui-label visually-hidden" for="password">パスワード</label>
              <input id="password" class="ui-control" type="password" name="password" placeholder="パスワード" autocomplete="current-password" />
            </div>

            <label class="toggle" for="show-password">
              <input id="show-password" type="checkbox" />
              パスワードを表示
            </label>

            <button type="submit" class="ui-btn--primary">
              <span class="material-symbols-rounded" aria-hidden="true">login</span>
              ログイン
            </button>
          </form>
        </div>
      </div>

      <nav class="reminder" aria-label="ログインサポート">
        <a href="password-reminder.html">パスワードをお忘れの方</a>
        <a href="login-id-reminder.html">ログインIDをお忘れの方</a>
      </nav>
    </div>
  </div>
</body>
</html>
